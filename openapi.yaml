  /payments/callback:
    post:
      summary: Webhook PayTech
      description: |
        Endpoint de callback pour les notifications de paiement PayTech (IPN).
        Vérifie la signature et met à jour le statut du paiement.
      tags:
        - Payments
      parameters:
        - in: header
          name: x-paytech-signature
          required: true
          schema:
            type: string
          description: Signature HMAC-SHA256 du payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayTechWebhookPayload'
            example:
              ref_command: "CMD-123456"
              token: "tok_abc123"
              amount: "50000"
              currency: "XOF"
              status: "approved"
              payment_method: "mobile_money"
              phone_number: "+221771234567"
              operator: "orange"
      responses:
        200:
          description:Webhook traité
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        400:
          description: Signature invalide ou données invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

