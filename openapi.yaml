    workerId:
      in: path
      name: workerId
      required: true
      schema:
        type: string
        format: uuid
      description: ID du worker
    serviceId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: ID du service
    disputeId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: ID de la dispute
    reviewId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: ID de l'avis
    notificationId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: ID de la notification

paths:
  # ============================================================================
  # AUTHENTICATION
  # ============================================================================
  /auth/register:
    post:
      summary: Inscription d'un nouvel utilisateur
      description: |
        Permet d'inscrire un nouveau CLIENT ou WORKER sur la plateforme.
        
        ## Types d'inscription
        
        ### Pour CLIENT:
        - `type`: "CLIENT"
        - `professionId`: ne doit PAS être présent
        - Envoyez les données en JSON
        
        ### Pour WORKER:
        - `type`: "WORKER"
        - `professionId`: **obligatoire** (UUID de la profession)
        - Envoyez en `multipart/form-data` avec les fichiers suivants:
          
        ### Fichiers REQUIS (multipart/form-data):
        - `identityCardRecto`: Fichier du recto de la pièce d'identité (CNI, passeport)
        - `identityCardVerso`: Fichier du verso de la pièce d'identité
        
        ### Fichier OPTIONNEL:
        - `diploma`: Fichier du diplôme ou certificat (optionnel)
        
        **Note**: Pour WORKER, utilisez `multipart/form-data` avec les fichiers binaires.
        Les autres champs (nom, prenom, etc.) doivent être envoyés comme champs de formulaire.
      tags:
        - Auth
      consumes:
        - multipart/form-data
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - nom
                - prenom
                - adresse
                - tel
                - email
                - password
                - type
              properties:
                nom:
                  type: string
                  maxLength: 100
                  description: Nom de famille
                  example: "Sall"
                prenom:
                  type: string
                  maxLength: 100
                  description: Prénom
                  example: "Fatou"
                adresse:
                  type: string
                  maxLength: 255
                  description: Adresse
                  example: "Point E, Dakar"
                tel:
                  type: string
                  maxLength: 20
                  description: Numéro de téléphone
                  example: "+221761234567"
                email:
                  type: string
                  format: email
                  maxLength: 255
                  description: Adresse email
                  example: "fatou.sall@email.com"
                password:
                  type: string
                  minLength: 8
                  maxLength: 100
                  description: Mot de passe
                  example: "Password123"
                type:
                  type: string
                  enum: [CLIENT, WORKER]
                  description: Type de compte (CLIENT ou WORKER)
                  example: "WORKER"
                professionId:
                  type: string
                  format: uuid
                  description: |
                    UUID de la profession (SEULLEMENT pour WORKER, obligatoire si type=WORKER)
                  example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                identityCardRecto:
                  type: string
                  format: binary
                  description: |
                    **SEULEMENT pour WORKER - REQUIS**
                    Fichier du recto de la pièce d'identité (CNI, passeport, permis de conduire)
                    Types: image/jpeg, image/png, application/pdf
                identityCardVerso:
                  type: string
                  format: binary
                  description: |
                    **SEULEMENT pour WORKER - REQUIS**
                    Fichier du verso de la pièce d'identité
                    Types: image/jpeg, image/png, application/pdf
                diploma:
                  type: string
                  format: binary
                  nullable: true
                  description: |
                    **SEULEMENT pour WORKER - OPTIONNEL**
                    Fichier du diplôme ou certificat
                    Types: image/jpeg, image/png, application/pdf
            examples:
              inscription_client:
                summary: Inscription CLIENT
                description: Pour CLIENT, n'incluez pas professionId ni les fichiers
                value:
                  nom: "Diop"
                  prenom: "Moussa"
                  adresse: "Bloc 12, Parcelles Assainies, Dakar"
                  tel: "+221771234567"
                  email: "moussa.diop@email.com"
                  password: "Password123"
                  type: "CLIENT"
              inscription_worker:
                summary: Inscription WORKER avec documents
                description: |
                  Pour WORKER:
                  1. Sélectionnez un fichier pour identityCardRecto (obligatoire)
                  2. Sélectionnez un fichier pour identityCardVerso (obligatoire)
                  3. Optionally sélectionnez un fichier pour diploma
                value:
                  nom: "Sall"
                  prenom: "Fatou"
                  adresse: "Point E, Dakar"
                  tel: "+221761234567"
                  email: "fatou.sall@email.com"
                  password: "Password123"
                  type: "WORKER"
                  professionId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  identityCardRecto: "(cliquez Choose File pour sélectionner)"
                  identityCardVerso: "(cliquez Choose File pour sélectionner)"
                  diploma: "(cliquez Choose File pour sélectionner - optionnel)"
      responses:
        201:
          description: Inscription réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        400:
          description: Données de validation invalides ou fichiers manquants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              examples:
                validation_error:
                  summary: Erreur de validation des données
                  value:
                    success: false
                    message: "Les données fournies sont invalides."
                    code: "VALIDATION_ERROR"
                missing_identitycard_recto:
                  summary: Fichier recto d'identité manquant
                  value:
                    success: false
                    message: "Le fichier identityCardRecto (recto de la carte d'identité) est requis pour l'inscription worker"
                    code: "MISSING_FILE"
                missing_identitycard_verso:
                  summary: Fichier verso d'identité manquant
                  value:
                    success: false
                    message: "Le fichier identityCardVerso (verso de la carte d'identité) est requis pour l'inscription worker"
                    code: "MISSING_FILE"
        403:
          description: Type de compte invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
              example:
                success: false
                message: "L'inscription en tant qu'administrateur n'est pas autorisée."
                code: "AUTH_ADMIN_FORBIDDEN"
        409:
          description: Email déjà utilisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
              example:
                success: false
                message: "Cette adresse email est déjà utilisée."
                code: "AUTH_EMAIL_EXISTS"

  /auth/login:
    post:
      summary: Connexion utilisateur
      description: |
        Authentifie un utilisateur et retourne un token JWT.
        - Les workers doivent avoir un statut APPROVED pour se connecter
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "moussa.diop@email.com"
              password: "Password123"
      responses:
        200:
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        401:
          description: Mauvais identifiants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
              example:
                success: false
                message: "Email ou mot de passe incorrect."
                code: "AUTH_INVALID_CREDENTIALS"
        403:
          description: Compte worker en attente ou rejeté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
              examples:
                compte_pendant:
                  summary: Compte en attente de validation
                  value:
                    success: false
                    message: "Votre compte est en attente de validation par l'administrateur."
                    code: "AUTH_ACCOUNT_PENDING"
                compte_rejeté:
                  summary: Compte rejeté
                  value:
                    success: false
                    message: "Votre compte a été refusé par l'administrateur."
                    code: "AUTH_ACCOUNT_REJECTED"

  /auth/me:
    get:
      summary: Obtenir le profil de l'utilisateur connecté
      description: Retourne les informations de l'utilisateur authentifié
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        200:
          description: Profil utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        401:
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'

  # ============================================================================
  # MISSIONS
  # ============================================================================
  /missions:
    post:
      summary: Créer une nouvelle mission
      description: |
        Crée une nouvelle mission entre un client et un worker.
        Le clientId est récupéré depuis le token JWT.
      tags:
        - Missions
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMissionRequest'
            example:
              workerId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              serviceId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
      responses:
        201:
          description: Mission créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedResponse'
              example:
                success: true
                message: "Mission créée avec succès. En attente du paiement initial."
                data:
                  id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                  clientId: "d4e5f6a7-b8c9-0123-defg-234567890123"
                  workerId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  serviceId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                  prixMin: 50000
                  prixMax: 150000
                  prixFinal: null
                  montantRestant: null
                  status: "PENDING_PAYMENT"
                  createdAt: "2024-01-15T10:30:00.000Z"
        400:
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        401:
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        403:
          description: Accès refusé (réservé aux clients)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'

    get:
      summary: Liste des missions
      description: |
        Récupère la liste des missions avec pagination.
        Le filtrage est automatique selon le rôle:
        - CLIENT → voit ses propres missions
        - WORKER → voit ses propres missions
        - ADMIN → voit toutes les missions
      tags:
        - Missions
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - in: query
          name: details
          schema:
            type: boolean
            default: false
          description: Inclure les détails (client, worker, service)
        - in: query
          name: clientId
          schema:
            type: string
            format: uuid
          description: Filtrer par client (admin uniquement)
        - in: query
          name: workerId
          schema:
            type: string
            format: uuid
          description: Filtrer par worker (admin uniquement)
      responses:
        200:
          description: Liste des missions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Mission'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        401:
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'

  /missions/{id}:
    get:
      summary: Récupérer une mission par ID
      description: Récupère les détails d'une mission spécifique
      tags:
        - Missions
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/missionId'
      responses:
        200:
          description: Mission trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionWithDetails'
        401:
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        403:
          description: Accès refusé (ni client ni worker de la mission)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        404:
          description: Mission introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

  /missions/{id}/accept:
    post:
      summary: Accepter la mission
      description: Permet au worker d'accepter une mission en attente
      tags:
        - Missions
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/missionId'
      responses:
        200:
          description: Mission acceptée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        400:
          description: Erreur de validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        401:
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        403:
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        404:
          description: Mission introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

  /missions/{id}/refuse:
    post:
      summary: Refuser la mission
      description: Permet au worker de refuser une mission en attente
      tags:
        - Missions
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/missionId'
      responses:
        200:
          description: Mission refusée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        400:
          description: Erreur de validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        401:
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        403:
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        404:
          description: Mission introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

  /missions/{id}/confirm-initial-payment:
    post:
      summary: Confirmer le paiement initial
      description: Confirme le paiement initial et déverrouille les coordonnées du worker
      tags:
        - Missions
        - Payments
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/missionId'
      responses:
        200:
          description: Paiement initial confirmé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        400:
          description: Erreur de validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        401:
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        403:
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        404:
          description: Mission introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

  /missions/{id}/set-final-price:
    post:
      summary: Fixer le prix final
      description: Fixe le prix final après négociation entre le client et le worker
      tags:
        - Missions
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/missionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetFinalPriceRequest'
            example:
              prixFinal: 100000
      responses:
        200:
          description: Prix final fixé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        400:
          description: Erreur de validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        401:
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        403:
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'

  /missions/{id}/confirm-final-payment:
    post:
      summary: Confirmer le paiement final
      description: Confirme le paiement final et démarre la mission
      tags:
        - Missions
        - Payments
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/missionId'
      responses:
        200:
          description: Paiement final confirmé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        400:
          description: Erreur de validation
          content:
            application/json:
