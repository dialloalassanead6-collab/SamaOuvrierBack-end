openapi: 3.1.0
info:
  title: SamaOuvrier API
  description: |
    # API de la plateforme SamaOuvrier
    
    Plateforme de mise en relation entre clients et travailleurs qualifiés au Sénégal.
    
    ## Fonctionnalités principales
    
    - **Authentification**: Inscription et connexion JWT
    - **Gestion des utilisateurs**: Rôles CLIENT, WORKER, ADMIN
    - **Missions**: Création, gestion du cycle de vie complet
    - **Paiements**: Intégration PayTech avec système Escrow
    - **Disputes**: Gestion des litiges entre clients et workers
    - **Avis**: Système de notation des travailleurs
    - **Notifications**: Notifications en temps réel
    
    ## Flux de paiement Escrow
    
    1. Le client crée une mission
    2. Le client effectue le paiement initial (prix min)
    3. Le montant estheld en escrow
    4. Le worker accepte et complète le travail
    5. Le client confirme la completion
    6. Si nécessaire, le paiement final est effectué
    7. L'escrow est libéré au worker (moins la commission)
    
    ## Webhooks PayTech
    
    Les paiements sont gérés via le webhook `/api/payments/callback`
    avec signature de vérification dans l'en-tête `x-paytech-signature`.
  contact:
    name: Support SamaOuvrier
    email: support@samaouvrier.sn
  license:
    name: Propriétaire
    url: https://samaouvrier.sn/licenses
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Serveur de développement
  - url: https://api.samaouvrier.sn/api
    description: Serveur de production
tags:
  - name: Auth
    description: Endpoints d'authentification et d'inscription
  - name: Users
    description: Gestion des utilisateurs
  - name: Missions
    description: Gestion des missions et du cycle de vie
  - name: Payments
    description: Paiements et intégration PayTech
  - name: Escrow
    description: Gestion des fonds en attente
  - name: Disputes
    description: Gestion des litiges
  - name: Reviews
    description: Système d'avis et de notation
  - name: Services
    description: Services proposés par les workers
  - name: Dashboard
    description: Tableaux de bord selon le rôle
  - name: Admin
    description: Administration et modération
  - name: Notifications
    description: Gestion des notifications
  - name: Upload
    description: Upload de fichiers vers Cloudinary

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Jeton JWT d'authentification. Obtenu via `/auth/login`.
        À inclure dans l'en-tête `Authorization: Bearer <token>`.
  
  # ============================================================================
  # ENUMS
  # ============================================================================
  enums:
    Role:
      type: string
      enum: [ADMIN, CLIENT, WORKER]
      description: |
        Rôle de l'utilisateur dans le système.
        - CLIENT: Peut créer des missions
        - WORKER: Peut accepter des missions
        - ADMIN: Gestion complète de la plateforme
    
    WorkerStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]
      description: |
        Statut de validation d'un worker.
        - PENDING: En attente d'approbation admin
        - APPROVED: Validé et peut travailler
        - REJECTED: Rejeté par l'administrateur
    
    MissionStatus:
      type: string
      enum:
        - PENDING_PAYMENT
        - PENDING_ACCEPT
        - CONTACT_UNLOCKED
        - NEGOTIATION_DONE
        - AWAITING_FINAL_PAYMENT
        - IN_PROGRESS
        - COMPLETED
        - CANCEL_REQUESTED
        - CANCELLED
        - REFUSED
      description: |
        Statut de la mission.
        - PENDING_PAYMENT: En attente de paiement initial
        - PENDING_ACCEPT: En attente d'acceptation du worker
        - CONTACT_UNLOCKED: Coordonnées débloquées
        - NEGOTIATION_DONE: Négociation terminée
        - AWAITING_FINAL_PAYMENT: En attente du paiement final
        - IN_PROGRESS: Mission en cours
        - COMPLETED: Mission terminée (double confirmation)
        - CANCEL_REQUESTED: Annulation demandée
        - CANCELLED: Annulée
        - REFUSED: Refusée par le worker
    
    PaymentStatus:
      type: string
      enum: [PENDING, SUCCESS, FAILED, REFUNDED, CANCELLED]
      description: |
        Statut du paiement.
        - PENDING: En attente
        - SUCCESS: Réussi
        - FAILED: Échoué
        - REFUNDED: Remboursé
        - CANCELLED: Annulé
    
    EscrowStatus:
      type: string
      enum: [PENDING, HELD, RELEASED, REFUNDED, PARTIALLY_REFUNDED]
      description: |
        Statut de l'escrow.
        - PENDING: En attente de confirmation
        - HELD: Fonds bloqués
        - RELEASED: Fonds libérés au worker
        - REFUNDED: Remboursé au client
        - PARTIALLY_REFUNDED: Remboursement partiel
    
    DisputeStatus:
      type: string
      enum: [PENDING, OPEN, UNDER_REVIEW, RESOLVED, CLOSED]
      description: |
        Statut de la dispute.
        - PENDING: En attente de traitement
        - OPEN: Ouverte
        - UNDER_REVIEW: En cours d'examen
        - RESOLVED: Résolue
        - CLOSED: Fermée
    
    DisputeReason:
      type: string
      enum:
        - PAYMENT_ISSUE
        - WORK_NOT_DONE
        - QUALITY_UNSATISFACTORY
        - NO_SHOW
        - CANCELLATION_ISSUE
        - COMMUNICATION_ISSUE
        - OTHER
      description: Raison de la dispute.
    
    DisputeResolution:
      type: string
      enum:
        - CLIENT_WINS
        - WORKER_WINS
        - PARTIAL_REFUND
        - FULL_REFUND
        - NO_REFUND
        - DRAW
      description: Résultat de la résolution de dispute.
    
    NotificationType:
      type: string
      enum:
        - ACCOUNT_CREATED
        - ACCOUNT_PENDING_APPROVAL
        - ACCOUNT_APPROVED
        - ACCOUNT_REJECTED
        - MISSION_CREATED
        - MISSION_ACCEPTED
        - MISSION_REFUSED
        - MISSION_COMPLETED
        - MISSION_CANCELLED
        - PAYMENT_RECEIVED
        - PAYMENT_RELEASED
        - PAYMENT_REFUNDED
        - DISPUTE_OPENED
        - DISPUTE_STATUS_UPDATED
        - DISPUTE_RESOLVED
        - REVIEW_RECEIVED
        - SYSTEM_NOTIFICATION
      description: Type de notification.
    
    NotificationStatus:
      type: string
      enum: [UNREAD, READ]
      description: Statut de lecture de la notification.
    
    ReviewStatus:
      type: string
      enum: [PENDING, DONE]
      description: Statut de l'avis.
  
  # ============================================================================
  # SCHEMAS - Common
  # ============================================================================
  schemas:
    # -------------------------------------------------------------------------
    # Error Responses
    # -------------------------------------------------------------------------
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
      required: [success, error]
    
    UnauthorizedError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Authentification échouée"
        code:
          type: string
          example: "AUTH_FAILED"
      required: [success, message]
    
    ForbiddenError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Permissions insuffisantes"
        code:
          type: string
          example: "FORBIDDEN"
      required: [success, message]
    
    NotFoundError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Ressource introuvable"
        code:
          type: string
          example: "NOT_FOUND"
      required: [success, message]
    
    ValidationError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: object
          properties:
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
      required: [success, message]
    
    ConflictError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Ressource déjà existante"
        code:
          type: string
          example: "CONFLICT"
      required: [success, message]
    
    # -------------------------------------------------------------------------
    # Common Objects
    # -------------------------------------------------------------------------
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 10
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 10
      required: [page, pageSize, total, totalPages]
    
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
      required: [success, message]
    
    CreatedResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              type: object
    
    # -------------------------------------------------------------------------
    # User Schemas
    # -------------------------------------------------------------------------
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID unique de l'utilisateur
        nom:
          type: string
          maxLength: 100
          description: Nom de famille
        prenom:
          type: string
          maxLength: 100
          description: Prénom
        adresse:
          type: string
          maxLength: 255
          description: Adresse complète
        tel:
          type: string
          maxLength: 20
          description: Numéro de téléphone
        email:
          type: string
          format: email
          maxLength: 255
          description: Adresse email
        role:
          $ref: '#/components/enums/Role'
        workerStatus:
          $ref: '#/components/enums/WorkerStatus'
          nullable: true
        professionId:
          type: string
          format: uuid
          nullable: true
          description: ID de la profession (pour workers)
        avatar:
          type: string
          nullable: true
          description: URL de l'avatar
        averageRating:
          type: number
          format: float
          description: Note moyenne (workers uniquement)
          nullable: true
        totalReviews:
          type: integer
          description: Nombre d'avis (workers uniquement)
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, nom, prenom, adresse, tel, email, role, createdAt, updatedAt]
    
    UserResponse:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            identityCardRecto:
              type: string
              nullable: true
            identityCardVerso:
              type: string
              nullable: true
            diploma:
              type: string
              nullable: true
    
    ClientRegisterRequest:
      type: object
      required:
        - nom
        - prenom
        - adresse
        - tel
        - email
        - password
        - type
      properties:
        nom:
          type: string
          maxLength: 100
          example: "Diop"
        prenom:
          type: string
          maxLength: 100
          example: "Moussa"
        adresse:
          type: string
          maxLength: 255
          example: "Bloc 12, Parcelles Assainies, Dakar"
        tel:
          type: string
          maxLength: 20
          example: "+221771234567"
        email:
          type: string
          format: email
          maxLength: 255
          example: "moussa.diop@email.com"
        password:
          type: string
          minLength: 8
          maxLength: 100
          example: "Password123"
        type:
          type: string
          enum: [CLIENT]
          example: "CLIENT"
    
    WorkerRegisterRequest:
      type: object
      required:
        - nom
        - prenom
        - adresse
        - tel
        - email
        - password
        - type
        - professionId
        - identityCardRecto
        - identityCardVerso
      properties:
        nom:
          type: string
          maxLength: 100
          example: "Sall"
        prenom:
          type: string
          maxLength: 100
          example: "Fatou"
        adresse:
          type: string
          maxLength: 255
          example: "Point E, Dakar"
        tel:
          type: string
          maxLength: 20
          example: "+221761234567"
        email:
          type: string
          format: email
          maxLength: 255
          example: "fatou.sall@email.com"
        password:
          type: string
          minLength: 8
          maxLength: 100
          example: "Password123"
        type:
          type: string
          enum: [WORKER]
          example: "WORKER"
        professionId:
          type: string
          format: uuid
          description: UUID de la profession/métier du worker
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        identityCardRecto:
          type: string
          format: binary
          description: |
            **REQUIS** - Fichier du recto de la pièce d'identité (CNI, passeport, permis de conduire)
            
            Types acceptés: image/jpeg, image/png, application/pdf
        identityCardVerso:
          type: string
          format: binary
          description: |
            **REQUIS** - Fichier du verso de la pièce d'identité (CNI, passeport, permis de conduire)
            
            Types acceptés: image/jpeg, image/png, application/pdf
        diploma:
          type: string
          format: binary
          nullable: true
          description: |
            **OPTIONNEL** - Fichier du diplôme ou certificat de qualification
            
            Types acceptés: image/jpeg, image/png, application/pdf
            Peut être omis ou mis à null
    
    UploadedFile:
      type: object
      properties:
        url:
          type: string
          format: uri
        publicId:
          type: string
        format:
          type: string
        bytes:
          type: integer
    
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "moussa.diop@email.com"
        password:
          type: string
          example: "Password123"
    
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Inscription effectuée avec succès."
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            token:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    
    # -------------------------------------------------------------------------
    # Mission Schemas
    # -------------------------------------------------------------------------
    CreateMissionRequest:
      type: object
      required:
        - workerId
        - serviceId
      properties:
        workerId:
          type: string
          format: uuid
          description: ID du worker sélectionné
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        serviceId:
          type: string
          format: uuid
          description: ID du service demandé
          example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
    
    Mission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        workerId:
          type: string
          format: uuid
        serviceId:
          type: string
          format: uuid
        prixMin:
          type: number
          description: Prix minimum (en CFA)
          example: 50000
        prixMax:
          type: number
          description: Prix maximum (en CFA)
          example: 150000
        prixFinal:
          type: number
          nullable: true
          description: Prix final convenu
        montantRestant:
          type: number
          nullable: true
          description: Montant restant à payer
        cancellationRequestedBy:
          type: string
          enum: [CLIENT, WORKER]
          nullable: true
        status:
          $ref: '#/components/enums/MissionStatus'
        clientConfirmed:
          type: boolean
        workerConfirmed:
          type: boolean
        reviewStatus:
          $ref: '#/components/enums/ReviewStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    MissionWithDetails:
      allOf:
        - $ref: '#/components/schemas/Mission'
        - type: object
          properties:
            client:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                nom:
                  type: string
                prenom:
                  type: string
            worker:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                nom:
                  type: string
                prenom:
                  type: string
            service:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                title:
                  type: string
                description:
                  type: string
    
    SetFinalPriceRequest:
      type: object
      required:
        - prixFinal
      properties:
        prixFinal:
          type: number
          minimum: 0
          description: Prix final convenu (en CFA)
          example: 100000
    
    ProcessCancellationRequest:
      type: object
      required:
        - approved
      properties:
        approved:
          type: boolean
          description: true pour approuver, false pour rejeter
    
    # -------------------------------------------------------------------------
    # Payment & Escrow Schemas
    # -------------------------------------------------------------------------
    CreatePaymentRequest:
      type: object
      required:
        - missionId
      properties:
        missionId:
          type: string
          format: uuid
          description: ID de la mission à payer
          example: "c3d4e5f6-a7b8-9012-cdef-123456789012"
    
    CreatePaymentResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            paymentId:
              type: string
              format: uuid
            escrowId:
              type: string
              format: uuid
            paymentUrl:
              type: string
              format: uri
            amount:
              type: number
              example: 50000
        message:
          type: string
          example: "Paiement initialisé. Veuillez compléter le paiement via PayTech."
    
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        missionId:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        workerId:
          type: string
          format: uuid
        amount:
          type: number
          description: Montant en CFA
          example: 50000
        currency:
          type: string
          default: XOF
          example: "XOF"
        status:
          $ref: '#/components/enums/PaymentStatus'
        paymentMethod:
          type: string
          nullable: true
        paytechRef:
          type: string
          nullable: true
        idempotencyKey:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    Escrow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        paymentId:
          type: string
          format: uuid
        missionId:
          type: string
          format: uuid
        amount:
          type: number
          description: Montant total en escrow (en CFA)
          example: 50000
        workerAmount:
          type: number
          description: Montant revenant au worker (en CFA)
          example: 45000
        commissionAmount:
          type: number
          description: Montant de la commission (en CFA)
          example: 5000
        status:
          $ref: '#/components/enums/EscrowStatus'
        releaseType:
          type: string
          nullable: true
        paytechRef:
          type: string
          nullable: true
        releasedBy:
          type: string
          nullable: true
        releaseReason:
          type: string
          nullable: true
        releasedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    ReleaseEscrowRequest:
      type: object
      properties:
        missionId:
          type: string
          format: uuid
          description: ID de la mission
    
    CancelPaymentRequest:
      type: object
      properties:
        missionId:
          type: string
          format: uuid
        cancellationType:
          type: string
          enum: [DIRECT, REQUESTED]
          default: DIRECT
    
    PaymentStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            missionId:
              type: string
              format: uuid
            paymentId:
              type: string
              format: uuid
            amount:
              type: number
            currency:
              type: string
            status:
              $ref: '#/components/enums/PaymentStatus'
            paytechRef:
              type: string
              nullable: true
            escrow:
              type: object
              nullable: true
              properties:
                id:
                  type: string
                  format: uuid
                amount:
                  type: number
                workerAmount:
                  type: number
                commissionAmount:
                  type: number
                status:
                  $ref: '#/components/enums/EscrowStatus'
                releasedAt:
                  type: string
                  format: date-time
                  nullable: true
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    
    PayTechWebhookPayload:
      type: object
      properties:
        ref_command:
          type: string
          description: Référence de commande PayTech
        token:
          type: string
          description: Jeton de transaction
        amount:
          type: string
          description: Montant (en CFA)
        currency:
          type: string
          default: "XOF"
        status:
          type: string
          description: Statut du paiement
        payment_method:
          type: string
          nullable: true
        phone_number:
          type: string
          nullable: true
        operator:
          type: string
          nullable: true
    
    # -------------------------------------------------------------------------
    # Dispute Schemas
    # -------------------------------------------------------------------------
    CreateDisputeRequest:
      type: object
      required:
        - missionId
        - reason
        - description
      properties:
        missionId:
          type: string
          format: uuid
          description: ID de la mission disputée
          example: "d4e5f6a7-b8c9-0123-defg-234567890123"
        reason:
          $ref: '#/components/enums/DisputeReason'
        description:
          type: string
          description: Description détaillée du problème
          example: "Le worker n'a pas terminé le travail convenu"
    
    Dispute:
      type: object
      properties:
        id:
          type: string
          format: uuid
        missionId:
          type: string
          format: uuid
        reporterId:
          type: string
          format: uuid
        reportedUserId:
          type: string
          format: uuid
        reason:
          $ref: '#/components/enums/DisputeReason'
        description:
          type: string
        status:
          $ref: '#/components/enums/DisputeStatus'
        resolution:
          $ref: '#/components/enums/DisputeResolution'
          nullable: true
        resolutionNote:
          type: string
          nullable: true
        resolvedBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
    
    DisputeEvidence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        disputeId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        publicId:
          type: string
        type:
          type: string
        mimeType:
          type: string
          nullable: true
        size:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
        uploadedBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    
    AddEvidenceRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
          description: Fichier à uploader (image, vidéo ou document)
        description:
          type: string
          description: Description de la preuve
    
    ResolveDisputeRequest:
      type: object
      required:
        - resolution
      properties:
        resolution:
          $ref: '#/components/enums/DisputeResolution'
        resolutionNote:
          type: string
          description: Notes de résolution (optionnel)
    
    # -------------------------------------------------------------------------
    # Review Schemas
    # -------------------------------------------------------------------------
    CreateReviewRequest:
      type: object
      required:
        - missionId
        - rating
      properties:
        missionId:
          type: string
          format: uuid
          description: ID de la mission terminée
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Note de 1 à 5 étoiles
        comment:
          type: string
          description: Commentaire (optionnel)
          nullable: true
    
    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        missionId:
          type: string
          format: uuid
        workerId:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    
    # -------------------------------------------------------------------------
    # Service Schemas
    # -------------------------------------------------------------------------
    CreateServiceRequest:
      type: object
      required:
        - title
        - description
        - minPrice
        - maxPrice
      properties:
        title:
          type: string
          maxLength: 200
          example: "Installation plomberie"
        description:
          type: string
          example: "Installation complète de plomberie pour maison"
        minPrice:
          type: number
          minimum: 0
          example: 50000
        maxPrice:
          type: number
          minimum: 0
          example: 500000
    
    UpdateServiceRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
        minPrice:
          type: number
          minimum: 0
        maxPrice:
          type: number
          minimum: 0
    
    Service:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        minPrice:
          type: number
        maxPrice:
          type: number
        workerId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    # -------------------------------------------------------------------------
    # Notification Schemas
    # -------------------------------------------------------------------------
    CreateNotificationRequest:
      type: object
      required:
        - userId
        - type
        - title
        - message
      properties:
        userId:
          type: string
          format: uuid
          description: ID du destinataire
        type:
          $ref: '#/components/enums/NotificationType'
        title:
          type: string
          maxLength: 200
        message:
          type: string
        relatedId:
          type: string
          description: ID de l'entité associée
          nullable: true
        relatedType:
          type: string
          description: Type d'entité associée (mission, payment, etc.)
          nullable: true
    
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          $ref: '#/components/enums/NotificationType'
        title:
          type: string
        message:
          type: string
        status:
          $ref: '#/components/enums/NotificationStatus'
        readAt:
          type: string
          format: date-time
          nullable: true
        relatedId:
          type: string
          nullable: true
        relatedType:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    
    UnreadCountResponse:
      type: object
      properties:
