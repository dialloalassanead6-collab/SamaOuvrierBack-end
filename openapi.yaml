            total:
              type: number
            successful:
              type: number
            pending:
              type: number
        disputes:
          type: object
          properties:
            total:
              type: integer
            open:
              type: integer
            resolved:
              type: integer
    
    WorkerDashboard:
      type: object
      properties:
        missions:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
            completed:
              type: integer
            cancelled:
              type: integer
        earnings:
          type: object
          properties:
            total:
              type: number
            pending:
              type: number
            released:
              type: number
        reputation:
          type: object
          properties:
            averageRating:
              type: number
            totalReviews:
              type: integer
        disputes:
          type: object
          properties:
            total:
              type: integer
            open:
              type: integer
    
    ClientDashboard:
      type: object
      properties:
        missions:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
            completed:
              type: integer
            cancelled:
              type: integer
        spending:
          type: object
          properties:
            total:
              type: number
            pending:
              type: number
            completed:
              type: number
        reliability:
